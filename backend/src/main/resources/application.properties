spring.application.name=backend

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/certificates_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=replace-with-a-very-long-secret-key-for-jwt-signing-at-least-32-bytes
app.jwt.expiration-ms=86400000

app.storage.pdf-dir=generated/pdfs
app.storage.qr-dir=generated/qrcodes

spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
