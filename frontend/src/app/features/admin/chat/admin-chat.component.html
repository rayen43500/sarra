<section class="chat-page">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="ai-avatar">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
      </div>
      <div>
        <h2>Assistant IA CertifyHub</h2>
        <p class="ai-status"><span class="status-dot"></span>Alimenté par Gemini 2.0 Flash</p>
      </div>
    </div>
    <button class="btn-clear" (click)="clearChat()" title="Réinitialiser la conversation">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.75"/></svg>
      Réinitialiser
    </button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chat-messages">
    @for (msg of messages; track $index) {
      <div class="message-row" [class.user-row]="msg.role === 'user'" [class.ai-row]="msg.role === 'model'">
        @if (msg.role === 'model') {
          <div class="msg-avatar ai-msg-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          </div>
        }
        <div class="message-bubble" [class.user-bubble]="msg.role === 'user'" [class.ai-bubble]="msg.role === 'model'">
          <div class="bubble-content" [innerHTML]="formatMessage(msg.content)"></div>
          <span class="bubble-time">{{ msg.timestamp | date:'HH:mm' }}</span>
        </div>
        @if (msg.role === 'user') {
          <div class="msg-avatar user-msg-avatar">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        }
      </div>
    }

    @if (isLoading) {
      <div class="message-row ai-row">
        <div class="msg-avatar ai-msg-avatar">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        </div>
        <div class="message-bubble ai-bubble typing-bubble">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>
    }
  </div>

  <!-- Suggestions (shown when only 1 message) -->
  @if (messages.length === 1 && !isLoading) {
    <div class="suggestions">
      @for (s of suggestions; track s) {
        <button class="suggestion-chip" (click)="sendSuggestion(s)">{{ s }}</button>
      }
    </div>
  }

  <!-- Input -->
  <div class="chat-input-bar">
    <textarea
      id="chat-input"
      class="chat-textarea"
      [(ngModel)]="inputText"
      (keydown)="onKeyDown($event)"
      placeholder="Posez votre question à l'assistant CertifyHub..."
      rows="1"
      [disabled]="isLoading"
    ></textarea>
    <button
      id="chat-send-btn"
      class="send-btn"
      (click)="sendMessage()"
      [disabled]="!inputText.trim() || isLoading"
      title="Envoyer (Entrée)"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</section>
